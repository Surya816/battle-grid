<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no">
  <meta name="theme-color" content="#050810">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <link rel="manifest" href="manifest.json">
  <title>Battle Grid</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      touch-action: manipulation;
      user-select: none;
      -webkit-user-select: none
    }

    html,
    body {
      overflow: hidden;
      height: 100%;
      width: 100%
    }

    body {
      background: #050810;
      color: #fff;
      display: flex;
      flex-direction: column;
      align-items: center;
      font-family: 'Segoe UI', Arial, sans-serif
    }

    #hud {
      width: 100%;
      max-width: 500px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 6px 10px
    }

    .phud {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 2px
    }

    .pname {
      font-size: 12px;
      font-weight: bold;
      letter-spacing: 1px
    }

    .hpbg {
      width: 90px;
      height: 12px;
      background: #1a1a2a;
      border-radius: 6px;
      overflow: hidden;
      border: 1px solid #333
    }

    .hpfill {
      height: 100%;
      border-radius: 6px;
      transition: width 0.12s
    }

    .hptxt {
      font-size: 9px;
      color: #888
    }

    #zone-box {
      text-align: center
    }

    #zone-timer {
      font-size: 22px;
      font-weight: bold;
      color: #ff4444;
      text-shadow: 0 0 10px #ff4444
    }

    #canvasWrap {
      position: relative;
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center
    }

    canvas {
      display: block
    }

    #overlay {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(3, 5, 16, 0.95);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 10px;
      padding: 16px;
      z-index: 10
    }

    #overlay h2 {
      font-size: 24px;
      letter-spacing: 3px;
      background: linear-gradient(90deg, #00d4ff, #ff4500);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text
    }

    #overlay p {
      font-size: 11px;
      color: #666;
      text-align: center;
      line-height: 1.7
    }

    .btn {
      background: linear-gradient(135deg, #00d4ff, #0066bb);
      color: #000;
      border: none;
      padding: 14px 36px;
      border-radius: 8px;
      font-size: 16px;
      font-weight: bold;
      cursor: pointer;
      font-family: inherit;
      letter-spacing: 1px;
      transition: transform 0.1s
    }

    .btn:active {
      transform: scale(0.95)
    }

    .diff-row {
      display: flex;
      gap: 6px
    }

    .dbtn {
      background: #0d0d1f;
      border: 2px solid #222;
      color: #888;
      padding: 8px 16px;
      border-radius: 6px;
      cursor: pointer;
      font-family: inherit;
      font-size: 12px;
      transition: all 0.15s
    }

    .dbtn.sel {
      border-color: #ff4500;
      color: #ff4500;
      background: #ff450011
    }

    #controls {
      width: 100%;
      max-width: 500px;
      display: flex;
      justify-content: space-between;
      align-items: flex-end;
      padding: 6px 8px
    }

    .dpad {
      display: grid;
      grid-template-columns: repeat(3, 52px);
      grid-template-rows: repeat(3, 52px);
      gap: 2px
    }

    .db {
      background: #0d0d1f;
      border: 1px solid #2a2a3a;
      border-radius: 10px;
      color: #888;
      font-size: 18px;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      -webkit-tap-highlight-color: transparent
    }

    .db:active {
      background: #1a1a35;
      color: #fff;
      border-color: #555
    }

    .right-controls {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 6px
    }

    .fire-btn {
      border: none;
      border-radius: 50%;
      width: 70px;
      height: 70px;
      font-size: 13px;
      font-weight: bold;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #fff;
      background: radial-gradient(circle, #ff6644, #aa2200);
      box-shadow: 0 0 20px #ff440066;
      -webkit-tap-highlight-color: transparent;
      transition: transform 0.08s
    }

    .fire-btn:active {
      transform: scale(0.88)
    }

    .pwr-row {
      display: flex;
      gap: 4px;
      flex-wrap: wrap;
      justify-content: center
    }

    .pwr-btn {
      background: #0d0d1f;
      border: 2px solid #222;
      border-radius: 8px;
      color: #666;
      padding: 9px 11px;
      font-size: 10px;
      font-weight: bold;
      cursor: pointer;
      font-family: inherit;
      min-width: 52px;
      text-align: center;
      position: relative;
      overflow: hidden;
      -webkit-tap-highlight-color: transparent;
      transition: all 0.15s
    }

    .pwr-btn:active {
      background: #1a1a35;
      color: #fff
    }

    .pwr-btn.ready {
      border-color: #00d4ff44;
      color: #aaa
    }

    .pwr-btn.on {
      border-color: #00ff88;
      color: #00ff88;
      background: #00ff8811;
      animation: pulse-on 0.6s infinite alternate
    }

    .pwr-btn.cd {
      opacity: 0.35;
      pointer-events: none
    }

    .pwr-btn .cd-bar {
      position: absolute;
      bottom: 0;
      left: 0;
      height: 3px;
      background: #00d4ff;
      transition: width 0.3s linear
    }

    @keyframes pulse-on {
      from {
        box-shadow: 0 0 4px #00ff8833
      }

      to {
        box-shadow: 0 0 12px #00ff8866
      }
    }

    #ev {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      font-size: 18px;
      font-weight: bold;
      pointer-events: none;
      opacity: 0;
      transition: opacity 0.3s;
      z-index: 5;
      text-shadow: 0 0 15px currentColor
    }

    #ev.show {
      opacity: 1
    }

    .p1c {
      color: #00d4ff
    }

    .p2c {
      color: #ff4500
    }

    #scanlines {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: repeating-linear-gradient(0deg, transparent, transparent 2px, rgba(0, 0, 0, 0.03) 2px, rgba(0, 0, 0, 0.03) 4px);
      pointer-events: none;
      z-index: 99
    }
  </style>
</head>

<body>
  <div id="scanlines"></div>
  <div id="hud">
    <div class="phud">
      <div class="pname p1c">YOU</div>
      <div class="hpbg">
        <div class="hpfill" id="p1bar" style="width:100%;background:linear-gradient(90deg,#00d4ff,#0088ff)"></div>
      </div>
      <div class="hptxt" id="p1txt">5 HP</div>
    </div>
    <div id="zone-box">
      <div id="zone-timer">--</div>
      <div style="font-size:8px;color:#ff4444;letter-spacing:1px">STORM</div>
    </div>
    <div class="phud">
      <div class="pname p2c">AI</div>
      <div class="hpbg">
        <div class="hpfill" id="p2bar" style="width:100%;background:linear-gradient(90deg,#ff4500,#cc2200)"></div>
      </div>
      <div class="hptxt" id="p2txt">5 HP</div>
    </div>
  </div>
  <div id="canvasWrap">
    <canvas id="C"></canvas>
    <div id="ev"></div>
    <div id="overlay">
      <h2>BATTLE GRID</h2>
      <p>1v1 tactical combat vs AI<br>Storm closes in — last one standing wins!<br><br>
        <b>WASD</b> move · <b>Click/Tap</b> shoot · <b>1-4</b> powers
      </p>
      <div style="font-size:10px;color:#555;margin-bottom:4px">DIFFICULTY</div>
      <div class="diff-row">
        <button class="dbtn" onclick="setDiff('easy')" id="deasy">Easy</button>
        <button class="dbtn sel" onclick="setDiff('medium')" id="dmed">Medium</button>
        <button class="dbtn" onclick="setDiff('hard')" id="dhard">Hard</button>
      </div>
      <button class="btn" onclick="startGame()">PLAY</button>
    </div>
  </div>
  <div id="controls">
    <div>
      <div class="dpad">
        <div></div>
        <div class="db" ontouchstart="mp('u',1)" ontouchend="mp('u',0)">W</div>
        <div></div>
        <div class="db" ontouchstart="mp('l',1)" ontouchend="mp('l',0)">A</div>
        <div class="db" style="color:#222;font-size:9px">+</div>
        <div class="db" ontouchstart="mp('r',1)" ontouchend="mp('r',0)">D</div>
        <div></div>
        <div class="db" ontouchstart="mp('d',1)" ontouchend="mp('d',0)">S</div>
        <div></div>
      </div>
    </div>
    <div class="right-controls">
      <div class="fire-btn" ontouchstart="mp('atk',1)" ontouchend="mp('atk',0)">FIRE</div>
      <div class="pwr-row">
        <div class="pwr-btn ready" id="pw0" ontouchstart="usePwr(0)">SHIELD<div class="cd-bar"></div>
        </div>
        <div class="pwr-btn ready" id="pw1" ontouchstart="usePwr(1)">FIRE<div class="cd-bar"></div>
        </div>
        <div class="pwr-btn ready" id="pw2" ontouchstart="usePwr(2)">SPEED<div class="cd-bar"></div>
        </div>
        <div class="pwr-btn ready" id="pw3" ontouchstart="usePwr(3)">WALL<div class="cd-bar"></div>
        </div>
      </div>
    </div>
  </div>
  <script>
    // ================================================================
    //  BATTLE GRID — Lightweight 1v1 vs AI
    //  No fog · Powers · Fast touch · PWA-ready
    // ================================================================
    const G = 10, MAXW = 500, WALLS = 13, MAX_HP = 5;
    const MOVE_MS = 130, PROJ_SPD = 750, ATK_CD = 550;
    const ZONE_MS = 9000, ZONE_DMG = 1, ZONE_DMG_MS = 2500;

    // Powers config: [name, cooldownMs, durationMs]
    const PWR = {
      SHIELD: { cd: 12000, dur: 4000, name: 'SHIELD' },
      FIRE: { cd: 15000, dur: 6000, name: 'FIRE' },
      SPEED: { cd: 10000, dur: 4000, name: 'SPEED' },
      WALL: { cd: 8000, dur: 0, name: 'WALL' }
    };
    const PWR_KEYS = ['SHIELD', 'FIRE', 'SPEED', 'WALL'];

    const AI_P = {
      easy: { ms: 320, acc: 0.40, atkCd: 1400, think: 400, pwr: 0.02, dodge: false },
      medium: { ms: 180, acc: 0.72, atkCd: 800, think: 180, pwr: 0.06, dodge: true },
      hard: { ms: 110, acc: 0.95, atkCd: 500, think: 80, pwr: 0.12, dodge: true }
    };

    let cv, cx, cell, S = {}, K = {}, TC = {}, raf = null, AC = null;
    let shk = { x: 0, y: 0, m: 0 }, aiDiff = 'medium', mouseX = 0, mouseY = 0;
    const ri = n => Math.floor(Math.random() * n);
    const clamp = (v, a, b) => Math.max(a, Math.min(b, v));

    // ── PWA ──
    if ('serviceWorker' in navigator) { navigator.serviceWorker.register('sw.js').catch(() => { }); }

    // ── INIT ──
    window.onload = () => {
      cv = document.getElementById('C'); cx = cv.getContext('2d'); resize();
      window.addEventListener('resize', resize);
      window.addEventListener('keydown', e => {
        K[e.code] = true;
        if (['Space', 'ArrowUp', 'ArrowDown', 'ArrowLeft', 'ArrowRight'].includes(e.code)) e.preventDefault();
        // Power keys 1-4
        if (e.code === 'Digit1') usePwr(0); if (e.code === 'Digit2') usePwr(1);
        if (e.code === 'Digit3') usePwr(2); if (e.code === 'Digit4') usePwr(3);
      });
      window.addEventListener('keyup', e => K[e.code] = false);
      cv.addEventListener('mousedown', e => {
        if (!S.running) return;
        const r = cv.getBoundingClientRect(); mouseX = e.clientX - r.left; mouseY = e.clientY - r.top; shootAtMouse();
      });
      cv.addEventListener('mousemove', e => { const r = cv.getBoundingClientRect(); mouseX = e.clientX - r.left; mouseY = e.clientY - r.top; });
      cv.addEventListener('touchstart', e => {
        if (!S.running) return;
        const r = cv.getBoundingClientRect(); const t = e.touches[0];
        mouseX = t.clientX - r.left; mouseY = t.clientY - r.top; shootAtMouse();
      }, { passive: true });
    };
    function resize() {
      const w = Math.min(window.innerWidth, MAXW); cell = Math.floor(w / G);
      cv.width = cell * G; cv.height = cell * G; if (S.running) render();
    }
    function setDiff(d) {
      aiDiff = d;['easy', 'med', 'hard'].forEach(x =>
        document.getElementById('d' + x).className = 'dbtn');
      document.getElementById('d' + (d === 'medium' ? 'med' : d)).className = 'dbtn sel';
    }
    function mp(d, v) {
      TC[d] = !!v;
      if (d === 'atk' && v && S.running) shootAtMouse();
    }

    // ── AUDIO ──
    function initAudio() { try { AC = new (window.AudioContext || window.webkitAudioContext)() } catch (e) { } }
    function snd(type) {
      if (!AC) return; const n = AC.currentTime, o = AC.createOscillator(), g = AC.createGain();
      o.connect(g); g.connect(AC.destination);
      if (type === 'shoot') { o.type = 'sine'; o.frequency.setValueAtTime(880, n); o.frequency.exponentialRampToValueAtTime(220, n + .12); g.gain.setValueAtTime(.18, n); g.gain.exponentialRampToValueAtTime(.001, n + .13); o.start(n); o.stop(n + .14) }
      else if (type === 'hit') { o.type = 'sawtooth'; o.frequency.setValueAtTime(280, n); o.frequency.exponentialRampToValueAtTime(50, n + .22); g.gain.setValueAtTime(.35, n); g.gain.exponentialRampToValueAtTime(.001, n + .25); o.start(n); o.stop(n + .26) }
      else if (type === 'zone') { o.type = 'square'; o.frequency.setValueAtTime(100, n); g.gain.setValueAtTime(.12, n); g.gain.exponentialRampToValueAtTime(.001, n + .3); o.start(n); o.stop(n + .32) }
      else if (type === 'pwr') { o.type = 'sine'; o.frequency.setValueAtTime(600, n); o.frequency.exponentialRampToValueAtTime(1200, n + .1); g.gain.setValueAtTime(.15, n); g.gain.exponentialRampToValueAtTime(.001, n + .12); o.start(n); o.stop(n + .13) }
      else if (type === 'shield') { o.type = 'triangle'; o.frequency.setValueAtTime(400, n); o.frequency.exponentialRampToValueAtTime(800, n + .15); g.gain.setValueAtTime(.2, n); g.gain.exponentialRampToValueAtTime(.001, n + .18); o.start(n); o.stop(n + .2) }
      else if (type === 'win') { [523, 659, 784, 1047].forEach((f, i) => { const oo = AC.createOscillator(), gg = AC.createGain(); oo.connect(gg); gg.connect(AC.destination); oo.frequency.value = f; const t = n + i * .12; gg.gain.setValueAtTime(.2, t); gg.gain.exponentialRampToValueAtTime(.001, t + .28); oo.start(t); oo.stop(t + .3) }) }
    }

    // ── MAP ──
    function makeWalls() {
      const w = new Map(), safe = new Set();
      for (let a = 0; a < 3; a++)for (let b = 0; b < 3; b++) { safe.add(a + ',' + b); safe.add((G - 1 - a) + ',' + (G - 1 - b)); }
      let c = 0; while (w.size < WALLS && ++c < 500) { const x = ri(G), y = ri(G), k = x + ',' + y; if (!safe.has(k)) w.set(k, 3); }
      return w;
    }
    function isW(x, y) { return x >= 0 && x < G && y >= 0 && y < G && S.walls.has(x + ',' + y); }
    function inB(x, y) { return x >= 0 && x < G && y >= 0 && y < G; }
    function hasLOS(ax, ay, bx, by) {
      if (ax === bx) { for (let y = Math.min(ay, by) + 1; y < Math.max(ay, by); y++)if (isW(ax, y)) return false; return true; }
      if (ay === by) { for (let x = Math.min(ax, bx) + 1; x < Math.max(ax, bx); x++)if (isW(x, ay)) return false; return true; }
      return false;
    }

    // ── MAKE PLAYER ──
    function makePlayer(id, x, y, col, isAI) {
      return {
        id, x, y, hp: MAX_HP, maxHp: MAX_HP, col, glow: col + '88',
        facing: { dx: isAI ? -1 : 1, dy: 0 }, moveT: 0, atkCd: 0, flash: 0, alive: true, isAI,
        shield: { on: false, t: 0, hits: 0 }, speed: { on: false, t: 0 },
        pwrCd: [0, 0, 0, 0], // cooldowns for shield/fire/speed/wall
        wallCharges: 4
      };
    }

    // ── START ──
    function startGame() {
      initAudio();
      S = {
        running: true, t: 0,
        walls: makeWalls(),
        terrain: Array.from({ length: G }, () => Array.from({ length: G }, () => Math.random())),
        zone: { x1: 0, y1: 0, x2: G - 1, y2: G - 1 }, zT: ZONE_MS, zdT: ZONE_DMG_MS,
        p1: makePlayer('p1', 1, 1, '#00d4ff', false),
        p2: makePlayer('p2', G - 2, G - 2, '#ff4500', true),
        proj: [], part: [], pops: [], fireTiles: new Map(), // key->ttl
        ai: { st: 'HUNT', tT: 0, skT: 0, lp: { x: -1, y: -1 }, dodgeDir: 0 },
        ts: performance.now()
      };
      document.getElementById('overlay').style.display = 'none';
      if (raf) cancelAnimationFrame(raf); raf = requestAnimationFrame(loop);
    }

    // ── LOOP ──
    function loop(ts) {
      const dt = Math.min(ts - S.ts, 50); S.ts = ts; if (!S.running) return;
      S.t += dt; update(dt); render(); raf = requestAnimationFrame(loop);
    }

    // ── UPDATE ──
    function update(dt) {
      const p1 = S.p1, p2 = S.p2;
      // Zone
      S.zT -= dt; if (S.zT <= 0) { shrinkZone(); S.zT = ZONE_MS; }
      S.zdT -= dt; if (S.zdT <= 0) { zoneDmg(); S.zdT = ZONE_DMG_MS; }
      // Fire tiles tick
      const deadFires = [];
      S.fireTiles.forEach((ttl, k) => {
        const nt = ttl - dt; if (nt <= 0) deadFires.push(k); else S.fireTiles.set(k, nt);
        // Damage players on fire
        const [fx, fy] = k.split(',').map(Number);
        [p1, p2].forEach(p => {
          if (p.alive && p.x === fx && p.y === fy && S.t % 800 < dt) {
            dmg(p, 1); burst(p.x * cell + cell / 2, p.y * cell + cell / 2, '#ff4400', 6, 80);
          }
        });
      });
      deadFires.forEach(k => S.fireTiles.delete(k));
      // Shield timers
      [p1, p2].forEach(p => {
        if (p.shield.on) { p.shield.t -= dt; if (p.shield.t <= 0 || p.shield.hits <= 0) p.shield.on = false; }
        if (p.speed.on) { p.speed.t -= dt; if (p.speed.t <= 0) p.speed.on = false; }
        for (let i = 0; i < 4; i++)p.pwrCd[i] = Math.max(0, p.pwrCd[i] - dt);
      });
      // Player input
      playerInput(dt);
      // AI
      if (p2.alive && p1.alive) updateAI(dt);
      // Attack cooldowns
      p1.atkCd = Math.max(0, p1.atkCd - dt); p2.atkCd = Math.max(0, p2.atkCd - dt);
      p1.flash = Math.max(0, p1.flash - dt); p2.flash = Math.max(0, p2.flash - dt);
      // Projectiles
      updProj(dt);
      // Particles
      S.part = S.part.filter(p => { p.life -= dt; p.x += p.vx * (dt / 1000); p.y += p.vy * (dt / 1000); p.vy += 160 * (dt / 1000); return p.life > 0; });
      S.pops = S.pops.filter(p => { p.life -= dt; return p.life > 0; });
      // Shake
      shk.m *= 0.8; if (shk.m > 0.3) { shk.x = (Math.random() - .5) * shk.m; shk.y = (Math.random() - .5) * shk.m; } else { shk.x = 0; shk.y = 0; shk.m = 0; }
      checkWin(); updateHUD();
    }

    // ── PLAYER INPUT ──
    function playerInput(dt) {
      const p = S.p1; if (!p.alive) return;
      const spd = p.speed.on ? MOVE_MS / 2.5 : MOVE_MS;
      p.moveT = Math.max(0, p.moveT - dt);
      if (p.moveT <= 0) {
        let dx = 0, dy = 0;
        if (K['KeyW'] || TC.u) dy = -1; else if (K['KeyS'] || TC.d) dy = 1;
        else if (K['KeyA'] || TC.l) dx = -1; else if (K['KeyD'] || TC.r) dx = 1;
        if (dx || dy) {
          p.facing = { dx: dx || p.facing.dx, dy: dy || p.facing.dy };
          const nx = p.x + dx, ny = p.y + dy;
          if (inB(nx, ny) && !isW(nx, ny) && !(S.p2.alive && S.p2.x === nx && S.p2.y === ny)) {
            p.x = nx; p.y = ny; p.moveT = spd;
          }
        }
      }
    }
    function shootAtMouse() {
      const p = S.p1; if (!p.alive || p.atkCd > 0) return;
      const ux = p.x * cell + cell / 2, uy = p.y * cell + cell / 2;
      const adx = mouseX - ux, ady = mouseY - uy;
      let dx = 0, dy = 0;
      if (Math.abs(adx) > Math.abs(ady)) { dx = adx > 0 ? 1 : -1; } else { dy = ady > 0 ? 1 : -1; }
      p.facing = { dx, dy }; shoot(p);
    }

    // ── POWERS ──
    function usePwr(i) {
      const p = S.p1; if (!p.alive || !S.running) return;
      if (p.pwrCd[i] > 0) return;
      const pw = PWR_KEYS[i];
      if (pw === 'SHIELD') {
        p.shield = { on: true, t: PWR.SHIELD.dur, hits: 2 }; p.pwrCd[0] = PWR.SHIELD.cd;
        banner('SHIELD ON!', 1500, '#00ff88'); snd('shield');
        burst(p.x * cell + cell / 2, p.y * cell + cell / 2, '#00ff88', 12, 120);
      } else if (pw === 'FIRE') {
        // Place 3 fire tiles in facing direction
        for (let s = 1; s <= 3; s++) {
          const fx = p.x + p.facing.dx * s, fy = p.y + p.facing.dy * s;
          if (inB(fx, fy) && !isW(fx, fy)) S.fireTiles.set(fx + ',' + fy, PWR.FIRE.dur);
        }
        p.pwrCd[1] = PWR.FIRE.cd; banner('FIRE!', 1500, '#ff4400'); snd('pwr');
      } else if (pw === 'SPEED') {
        p.speed = { on: true, t: PWR.SPEED.dur }; p.pwrCd[2] = PWR.SPEED.cd;
        banner('SPEED BOOST!', 1500, '#ffcc00'); snd('pwr');
        burst(p.x * cell + cell / 2, p.y * cell + cell / 2, '#ffcc00', 10, 100);
      } else if (pw === 'WALL') {
        if (p.wallCharges <= 0) { addPop(p.x * cell + cell / 2, p.y * cell + cell / 2 - 10, 'NO WALLS', '#ff4444'); return; }
        const wx = p.x + p.facing.dx, wy = p.y + p.facing.dy;
        if (!inB(wx, wy) || isW(wx, wy) || (S.p2.alive && S.p2.x === wx && S.p2.y === wy)) return;
        S.walls.set(wx + ',' + wy, 3); p.wallCharges--; p.pwrCd[3] = PWR.WALL.cd; snd('pwr');
      }
      updatePwrUI();
    }
    function updatePwrUI() {
      const p = S.p1;
      PWR_KEYS.forEach((k, i) => {
        const el = document.getElementById('pw' + i);
        const cdRatio = p.pwrCd[i] / (PWR[k].cd);
        if (p.pwrCd[i] > 0) {
          el.className = 'pwr-btn cd';
          el.querySelector('.cd-bar').style.width = (1 - cdRatio) * 100 + '%';
        } else if ((k === 'SHIELD' && p.shield.on) || (k === 'SPEED' && p.speed.on)) {
          el.className = 'pwr-btn on';
          el.querySelector('.cd-bar').style.width = '100%';
        } else {
          el.className = 'pwr-btn ready';
          el.querySelector('.cd-bar').style.width = '0%';
        }
      });
    }

    // ── SHOOTING ──
    function shoot(p) {
      p.atkCd = p.isAI ? AI_P[aiDiff].atkCd : ATK_CD;
      const sx = p.x * cell + cell / 2, sy = p.y * cell + cell / 2;
      S.proj.push({
        x: sx, y: sy, vx: p.facing.dx * PROJ_SPD, vy: p.facing.dy * PROJ_SPD,
        from: p.id, col: p.col, trail: [], done: false
      });
      snd('shoot'); burst(sx, sy, p.col, 5, 100);
    }

    // ── PROJECTILES ──
    function updProj(dt) {
      S.proj.forEach(pr => {
        if (pr.done) return;
        pr.trail.unshift({ x: pr.x, y: pr.y }); if (pr.trail.length > 10) pr.trail.pop();
        pr.x += pr.vx * (dt / 1000); pr.y += pr.vy * (dt / 1000);
        const gx = Math.floor(pr.x / cell), gy = Math.floor(pr.y / cell);
        if (!inB(gx, gy)) { pr.done = true; return; }
        // Wall hit
        if (S.walls.has(gx + ',' + gy)) {
          const hp = S.walls.get(gx + ',' + gy) - 1;
          if (hp <= 0) { S.walls.delete(gx + ',' + gy); burst(pr.x, pr.y, '#aa8833', 12, 140); }
          else { S.walls.set(gx + ',' + gy, hp); burst(pr.x, pr.y, '#aa8833', 6, 80); }
          pr.done = true; snd('hit'); return;
        }
        // Hit player
        const tgt = pr.from === 'p1' ? S.p2 : S.p1;
        if (tgt.alive && tgt.x === gx && tgt.y === gy) {
          // Shield check
          if (tgt.shield.on && tgt.shield.hits > 0) {
            tgt.shield.hits--;
            burst(pr.x, pr.y, '#00ff88', 15, 180);
            addPop(pr.x, pr.y - 10, 'BLOCKED!', '#00ff88'); snd('shield');
            pr.done = true; return;
          }
          dmg(tgt, 1); burst(pr.x, pr.y, pr.col, 18, 200); shk.m = 12; snd('hit'); pr.done = true;
        }
      });
      S.proj = S.proj.filter(p => !p.done);
    }

    function dmg(p, d) {
      p.hp = Math.max(0, p.hp - d); p.flash = 400;
      if (p.hp <= 0) { p.alive = false; burst(p.x * cell + cell / 2, p.y * cell + cell / 2, '#ff4400', 25, 200); shk.m = 18; snd('hit'); }
    }

    // ── ZONE ──
    function shrinkZone() {
      const z = S.zone; if (z.x2 - z.x1 < 3 || z.y2 - z.y1 < 3) return;
      const s = ['x1', 'y1', 'x2', 'y2'][ri(4)];
      if (s === 'x1') z.x1 = Math.min(z.x1 + 1, z.x2 - 2);
      if (s === 'y1') z.y1 = Math.min(z.y1 + 1, z.y2 - 2);
      if (s === 'x2') z.x2 = Math.max(z.x2 - 1, z.x1 + 2);
      if (s === 'y2') z.y2 = Math.max(z.y2 - 1, z.y1 + 2);
      shk.m = 8; snd('zone');
    }
    function zoneDmg() {
      const z = S.zone;
      [S.p1, S.p2].forEach(p => {
        if (!p.alive) return;
        if (p.x < z.x1 || p.x > z.x2 || p.y < z.y1 || p.y > z.y2) {
          dmg(p, ZONE_DMG); burst(p.x * cell + cell / 2, p.y * cell + cell / 2, '#ff4400', 8, 90); snd('zone');
        }
      });
    }

    // ── AI (Smart + Aggressive) ──
    function updateAI(dt) {
      const ai = S.p2, pl = S.p1, cfg = AI_P[aiDiff], a = S.ai;
      a.tT -= dt; if (a.tT > 0) return; a.tT = cfg.think;
      if (!ai.alive) return;
      const z = S.zone, dist = Math.abs(ai.x - pl.x) + Math.abs(ai.y - pl.y);
      const inZ = ai.x >= z.x1 && ai.x <= z.x2 && ai.y >= z.y1 && ai.y <= z.y2;
      // State
      if (!inZ) a.st = 'ROTATE';
      else if (ai.hp <= 1 && dist < 3) a.st = 'EVADE';
      else if (dist <= 2) a.st = 'RUSH';
      else a.st = 'HUNT';
      // Target
      let tx, ty;
      if (a.st === 'ROTATE') { tx = Math.floor((z.x1 + z.x2) / 2); ty = Math.floor((z.y1 + z.y2) / 2); }
      else if (a.st === 'EVADE') { tx = clamp(ai.x * 2 - pl.x, z.x1, z.x2); ty = clamp(ai.y * 2 - pl.y, z.y1, z.y2); }
      else { tx = pl.x; ty = pl.y; }
      // Dodge incoming projectiles
      if (cfg.dodge) {
        const threats = S.proj.filter(p => p.from === 'p1' && !p.done);
        for (const pr of threats) {
          const pgx = Math.floor(pr.x / cell), pgy = Math.floor(pr.y / cell);
          const willHitX = pr.vx !== 0 && pgy === ai.y && ((pr.vx > 0 && pgx <= ai.x) || (pr.vx < 0 && pgx >= ai.x));
          const willHitY = pr.vy !== 0 && pgx === ai.x && ((pr.vy > 0 && pgy <= ai.y) || (pr.vy < 0 && pgy >= ai.y));
          if (willHitX) {
            // Dodge vertically
            const ddy = ai.y < Math.floor(G / 2) ? 1 : -1;
            const ny = ai.y + ddy;
            if (inB(ai.x, ny) && !isW(ai.x, ny)) { ai.y = ny; ai.moveT = cfg.ms; return; }
          }
          if (willHitY) {
            // Dodge horizontally
            const ddx = ai.x < Math.floor(G / 2) ? 1 : -1;
            const nx = ai.x + ddx;
            if (inB(nx, ai.y) && !isW(nx, ai.y)) { ai.x = nx; ai.moveT = cfg.ms; return; }
          }
        }
      }
      // Move toward target
      const spd = ai.speed.on ? cfg.ms / 2.5 : cfg.ms;
      ai.moveT = Math.max(0, ai.moveT - dt);
      if (ai.moveT <= 0) {
        let mx = Math.sign(tx - ai.x), my = Math.sign(ty - ai.y);
        if (Math.abs(tx - ai.x) >= Math.abs(ty - ai.y)) my = 0; else mx = 0;
        // Try to not walk into fire
        const nk = (ai.x + mx) + ',' + (ai.y + my);
        if (S.fireTiles.has(nk)) {
          // Try perpendicular
          if (mx !== 0) { my = ri(2) ? 1 : -1; mx = 0; } else { mx = ri(2) ? 1 : -1; my = 0; }
        }
        if (mx || my) {
          ai.facing = { dx: mx || ai.facing.dx, dy: my || ai.facing.dy };
          const nx = ai.x + mx, ny = ai.y + my;
          if (inB(nx, ny) && !isW(nx, ny) && !(pl.alive && pl.x === nx && pl.y === ny)) {
            ai.x = nx; ai.y = ny; ai.moveT = spd;
          }
        }
      }
      // Shoot
      if (ai.atkCd <= 0 && pl.alive) {
        const aligned = (pl.x === ai.x || pl.y === ai.y);
        if (aligned && hasLOS(ai.x, ai.y, pl.x, pl.y)) {
          ai.facing = { dx: Math.sign(pl.x - ai.x) || ai.facing.dx, dy: Math.sign(pl.y - ai.y) || ai.facing.dy };
          if (Math.random() < cfg.acc) shoot(ai);
        } else if (aiDiff === 'hard' && dist <= 3 && Math.random() < 0.1) {
          // Hard AI: face player and take speculative shot
          if (Math.abs(pl.x - ai.x) >= Math.abs(pl.y - ai.y)) ai.facing = { dx: Math.sign(pl.x - ai.x), dy: 0 };
          else ai.facing = { dx: 0, dy: Math.sign(pl.y - ai.y) };
          shoot(ai);
        }
      }
      // AI power usage
      if (Math.random() < cfg.pwr) {
        // Shield when low HP
        if (ai.hp <= 2 && ai.pwrCd[0] <= 0 && !ai.shield.on) {
          ai.shield = { on: true, t: PWR.SHIELD.dur, hits: 2 }; ai.pwrCd[0] = PWR.SHIELD.cd;
          burst(ai.x * cell + cell / 2, ai.y * cell + cell / 2, '#ff880088', 10, 100);
        }
        // Fire near player
        else if (ai.pwrCd[1] <= 0 && dist <= 4) {
          for (let s = 1; s <= 3; s++) {
            const fx = ai.x + ai.facing.dx * s, fy = ai.y + ai.facing.dy * s;
            if (inB(fx, fy) && !isW(fx, fy)) S.fireTiles.set(fx + ',' + fy, PWR.FIRE.dur);
          }
          ai.pwrCd[1] = PWR.FIRE.cd;
        }
        // Speed when chasing
        else if (ai.pwrCd[2] <= 0 && dist > 4 && a.st === 'HUNT') {
          ai.speed = { on: true, t: PWR.SPEED.dur }; ai.pwrCd[2] = PWR.SPEED.cd;
        }
        // Wall when close combat
        else if (ai.pwrCd[3] <= 0 && dist <= 2 && ai.wallCharges > 0) {
          const wx = ai.x + ai.facing.dx, wy = ai.y + ai.facing.dy;
          if (inB(wx, wy) && !isW(wx, wy) && !(pl.x === wx && pl.y === wy)) {
            S.walls.set(wx + ',' + wy, 3); ai.wallCharges--; ai.pwrCd[3] = PWR.WALL.cd;
          }
        }
      }
      // Stuck detection
      if (a.lp.x === ai.x && a.lp.y === ai.y) {
        a.skT += cfg.think;
        if (a.skT > 500) {
          const dirs = [{ dx: 1, dy: 0 }, { dx: -1, dy: 0 }, { dx: 0, dy: 1 }, { dx: 0, dy: -1 }];
          ai.facing = dirs[ri(4)]; a.skT = 0;
          // Force move
          const nx = ai.x + ai.facing.dx, ny = ai.y + ai.facing.dy;
          if (inB(nx, ny) && !isW(nx, ny)) ai.x = nx, ai.y = ny;
        }
      } else a.skT = 0;
      a.lp = { x: ai.x, y: ai.y };
    }

    // ── WIN CHECK ──
    function checkWin() {
      if (!S.p1.alive && !S.p2.alive) { S.running = false; showEnd('DRAW', 'Both fell!', '#888'); }
      else if (!S.p1.alive) { S.running = false; showEnd('DEFEAT', 'AI wins this round.', '#ff4500'); }
      else if (!S.p2.alive) { S.running = false; snd('win'); showEnd('VICTORY!', 'You are the champion!', '#00ff88'); }
    }
    function showEnd(t, s, c) {
      document.getElementById('overlay').innerHTML =
        '<h2 style="color:' + c + ';text-shadow:0 0 20px ' + c + '">' + t + '</h2><p>' + s + '</p>' +
        '<button class="btn" onclick="startGame()">PLAY AGAIN</button>';
      document.getElementById('overlay').style.display = 'flex';
    }

    // ── HELPERS ──
    function burst(x, y, c, n, s) {
      for (let i = 0; i < n; i++) {
        const a = Math.random() * Math.PI * 2, sp = s * (.4 + Math.random());
        S.part.push({ x, y, vx: Math.cos(a) * sp, vy: Math.sin(a) * sp, col: c, life: 250 + Math.random() * 250, ml: 500, sz: 2 + Math.random() * 3 });
      }
    }
    function addPop(x, y, t, c) { S.pops.push({ x, y, t, c, life: 800, ml: 800 }); }
    function banner(txt, dur, col) {
      const el = document.getElementById('ev');
      el.textContent = txt; el.style.color = col; el.classList.add('show');
      setTimeout(() => el.classList.remove('show'), dur);
    }

    // ── RENDER ──
    function render() {
      cx.clearRect(0, 0, cv.width, cv.height); cx.save(); cx.translate(shk.x, shk.y);
      drawBg(); drawZone(); drawFire(); drawWalls(); drawSightLine(); drawPlayers(); drawProj(); drawPart(); drawPops(); drawVig();
      cx.restore();
    }
    function drawBg() {
      const t = S.terrain;
      for (let y = 0; y < G; y++)for (let x = 0; x < G; x++) {
        const v = t[y][x], alt = (x + y) % 2 === 0;
        cx.fillStyle = `rgb(${Math.floor(11 + v * 10)},${Math.floor(15 + v * 13)},${Math.floor(8 + v * 8)})`;
        cx.fillRect(x * cell, y * cell, cell, cell);
        cx.strokeStyle = 'rgba(255,255,255,0.02)'; cx.lineWidth = 0.5; cx.strokeRect(x * cell, y * cell, cell, cell);
      }
    }
    function drawZone() {
      const z = S.zone; cx.fillStyle = 'rgba(200,10,10,0.22)';
      for (let y = 0; y < G; y++)for (let x = 0; x < G; x++)
        if (x < z.x1 || x > z.x2 || y < z.y1 || y > z.y2) cx.fillRect(x * cell, y * cell, cell, cell);
      const p = .5 + .5 * Math.sin(Date.now() / 175);
      cx.shadowColor = '#ff2222'; cx.shadowBlur = 14 * p;
      cx.strokeStyle = `rgba(255,55,55,${.5 + .4 * p})`; cx.lineWidth = 2.5;
      cx.strokeRect(z.x1 * cell, z.y1 * cell, (z.x2 - z.x1 + 1) * cell, (z.y2 - z.y1 + 1) * cell); cx.shadowBlur = 0;
      // Timer
      cx.fillStyle = 'rgba(255,68,68,0.9)'; cx.font = 'bold 10px sans-serif'; cx.textAlign = 'center';
      document.getElementById('zone-timer').textContent = Math.ceil(S.zT / 1000) + 's';
    }
    function drawFire() {
      S.fireTiles.forEach((ttl, k) => {
        const [x, y] = k.split(',').map(Number); const px = x * cell, py = y * cell;
        const f = .5 + .3 * Math.sin(Date.now() / 100 + x * 3);
        cx.fillStyle = `rgba(255,${Math.floor(60 + 40 * f)},0,${.25 + .15 * f})`; cx.fillRect(px, py, cell, cell);
        cx.fillStyle = `rgba(255,${Math.floor(120 + 80 * f)},20,${.4 * f})`;
        cx.beginPath(); cx.moveTo(px + cell * .3, py + cell); cx.lineTo(px + cell * .5, py + cell * .3); cx.lineTo(px + cell * .7, py + cell); cx.fill();
      });
    }
    function drawWalls() {
      S.walls.forEach((hp, k) => {
        const [wx, wy] = k.split(',').map(Number), px = wx * cell, py = wy * cell, df = (3 - hp) / 3;
        cx.fillStyle = `rgb(${Math.floor(42 - df * 15)},${Math.floor(34 - df * 12)},${Math.floor(21 - df * 8)})`;
        cx.fillRect(px + 1, py + 1, cell - 2, cell - 2);
        cx.fillStyle = `rgb(${Math.floor(74 - df * 20)},${Math.floor(62 - df * 15)},${Math.floor(40 - df * 10)})`;
        cx.fillRect(px + 1, py + 1, cell - 2, 4);
        // Brick lines
        cx.strokeStyle = 'rgba(30,20,10,0.3)'; cx.lineWidth = .5;
        cx.beginPath(); cx.moveTo(px + 1, py + cell * .4); cx.lineTo(px + cell - 1, py + cell * .4); cx.stroke();
        if (hp < 3) {
          cx.strokeStyle = 'rgba(80,50,20,0.5)'; cx.lineWidth = 1; cx.beginPath();
          cx.moveTo(px + cell * .3, py + cell * .2); cx.lineTo(px + cell * .6, py + cell * .7); cx.stroke();
        }
      });
    }
    function drawSightLine() {
      [S.p1, S.p2].forEach(p => {
        if (!p.alive || p.atkCd > 0) return;
        const sx = p.x * cell + cell / 2, sy = p.y * cell + cell / 2;
        const pulse = .1 + .08 * Math.sin(Date.now() / 120);
        cx.strokeStyle = p.col + Math.floor(pulse * 255).toString(16).padStart(2, '0');
        cx.lineWidth = 1.2; cx.setLineDash([4, 7]);
        cx.beginPath(); cx.moveTo(sx, sy);
        cx.lineTo(sx + p.facing.dx * cv.width, sy + p.facing.dy * cv.height);
        cx.stroke(); cx.setLineDash([]);
      });
    }
    function drawPlayers() {
      [S.p1, S.p2].forEach(p => {
        if (!p.alive) return;
        const ccx = p.x * cell + cell / 2, ccy = p.y * cell + cell / 2, r = cell * .38;
        // Flash
        if (p.flash > 0) { cx.fillStyle = `rgba(255,255,255,${(p.flash / 400) * .5})`; cx.fillRect(p.x * cell, p.y * cell, cell, cell); }
        // Shield aura
        if (p.shield.on) {
          const sp = .5 + .5 * Math.sin(Date.now() / 150);
          cx.strokeStyle = `rgba(0,255,136,${.3 + .3 * sp})`; cx.lineWidth = 3;
          cx.shadowColor = '#00ff88'; cx.shadowBlur = 16 * sp;
          cx.beginPath(); cx.arc(ccx, ccy, r + 6, 0, Math.PI * 2); cx.stroke(); cx.shadowBlur = 0;
        }
        // Speed aura
        if (p.speed.on) {
          cx.strokeStyle = 'rgba(255,204,0,0.3)'; cx.lineWidth = 2;
          cx.beginPath(); cx.arc(ccx, ccy, r + 4, 0, Math.PI * 2); cx.stroke();
        }
        // Glow ring
        cx.shadowColor = p.col; cx.shadowBlur = 18;
        cx.strokeStyle = p.col + '55'; cx.lineWidth = 2;
        cx.beginPath(); cx.arc(ccx, ccy, r + 2, 0, Math.PI * 2); cx.stroke(); cx.shadowBlur = 0;
        // Body
        cx.shadowColor = p.col; cx.shadowBlur = 14;
        cx.fillStyle = p.col + 'bb'; cx.beginPath(); cx.arc(ccx, ccy, r, 0, Math.PI * 2); cx.fill(); cx.shadowBlur = 0;
        // Headband
        cx.fillStyle = p.col; cx.fillRect(ccx - r, ccy - r, r * 2, Math.max(4, r * .25));
        // Eyes
        const isAI = p.isAI; const eyC = isAI ? '#ff0000' : '#ffffff'; const pupC = isAI ? '#ff6600' : '#0a0a18';
        const ex = p.facing.dx * r * .1, ey = p.facing.dy * r * .1;
        if (isAI) { cx.shadowColor = '#ff0000'; cx.shadowBlur = 8; }
        cx.fillStyle = eyC;
        cx.beginPath(); cx.arc(ccx - r * .28, ccy - r * .08, r * .14, 0, Math.PI * 2); cx.fill();
        cx.beginPath(); cx.arc(ccx + r * .28, ccy - r * .08, r * .14, 0, Math.PI * 2); cx.fill(); cx.shadowBlur = 0;
        cx.fillStyle = pupC;
        cx.beginPath(); cx.arc(ccx - r * .28 + ex, ccy - r * .08 + ey, r * .08, 0, Math.PI * 2); cx.fill();
        cx.beginPath(); cx.arc(ccx + r * .28 + ex, ccy - r * .08 + ey, r * .08, 0, Math.PI * 2); cx.fill();
        // Direction arrow
        const ax = ccx + p.facing.dx * (r + 5), ay = ccy + p.facing.dy * (r + 5);
        cx.fillStyle = p.col; cx.beginPath();
        if (p.facing.dx === 1) { cx.moveTo(ax, ay - 3); cx.lineTo(ax + 5, ay); cx.lineTo(ax, ay + 3); }
        else if (p.facing.dx === -1) { cx.moveTo(ax, ay - 3); cx.lineTo(ax - 5, ay); cx.lineTo(ax, ay + 3); }
        else if (p.facing.dy === -1) { cx.moveTo(ax - 3, ay); cx.lineTo(ax, ay - 5); cx.lineTo(ax + 3, ay); }
        else { cx.moveTo(ax - 3, ay); cx.lineTo(ax, ay + 5); cx.lineTo(ax + 3, ay); }
        cx.fill();
        // HP pips
        for (let i = 0; i < p.maxHp; i++) {
          cx.fillStyle = i < p.hp ? '#fff' : 'rgba(255,255,255,0.1)'; cx.beginPath();
          cx.arc(ccx - r + r * .35 + i * ((r * 1.9) / (p.maxHp - 1 || 1)), ccy + r * .72, r * .09, 0, Math.PI * 2); cx.fill();
        }
        // Label
        cx.fillStyle = 'rgba(0,0,0,0.8)'; cx.font = `bold ${Math.floor(cell * .25)}px sans-serif`;
        cx.textAlign = 'center'; cx.textBaseline = 'middle';
        cx.fillText(isAI ? 'AI' : 'P1', ccx, ccy + r * .18);
      });
    }
    function drawProj() {
      S.proj.forEach(pr => {
        pr.trail.forEach((t, i) => {
          const a = (i / pr.trail.length) * .5; cx.beginPath();
          cx.arc(t.x, t.y, Math.max(1, (pr.trail.length - i) * .5 + 1), 0, Math.PI * 2);
          cx.fillStyle = pr.col + Math.floor(a * 255).toString(16).padStart(2, '0'); cx.fill();
        });
        cx.shadowColor = pr.col; cx.shadowBlur = 20; cx.beginPath(); cx.arc(pr.x, pr.y, 5, 0, Math.PI * 2);
        cx.fillStyle = '#fff'; cx.fill(); cx.beginPath(); cx.arc(pr.x, pr.y, 3.5, 0, Math.PI * 2);
        cx.fillStyle = pr.col; cx.fill(); cx.shadowBlur = 0;
      });
    }
    function drawPart() {
      S.part.forEach(p => {
        const a = p.life / p.ml; cx.globalAlpha = a * .85; cx.fillStyle = p.col;
        cx.beginPath(); cx.arc(p.x, p.y, Math.max(.5, p.sz * a), 0, Math.PI * 2); cx.fill();
      }); cx.globalAlpha = 1;
    }
    function drawPops() {
      S.pops.forEach(p => {
        const a = p.life / p.ml; cx.globalAlpha = a; cx.fillStyle = p.c;
        cx.font = 'bold 12px sans-serif'; cx.textAlign = 'center';
        cx.fillText(p.t, p.x, p.y - (1 - a) * 25);
      }); cx.globalAlpha = 1;
    }
    function drawVig() {
      const gr = cx.createRadialGradient(cv.width / 2, cv.height / 2, cv.width * .3, cv.width / 2, cv.height / 2, cv.width * .78);
      gr.addColorStop(0, 'rgba(0,0,0,0)'); gr.addColorStop(1, 'rgba(0,0,0,0.45)');
      cx.fillStyle = gr; cx.fillRect(0, 0, cv.width, cv.height);
    }

    // ── HUD ──
    function updateHUD() {
      const p1 = S.p1, p2 = S.p2;
      document.getElementById('p1bar').style.width = (p1.hp / p1.maxHp) * 100 + '%';
      document.getElementById('p2bar').style.width = (p2.hp / p2.maxHp) * 100 + '%';
      document.getElementById('p1txt').textContent = p1.hp + ' HP' + (p1.shield.on ? ' [S]' : '') + (p1.speed.on ? ' [F]' : '');
      document.getElementById('p2txt').textContent = p2.hp + ' HP';
      updatePwrUI();
    }
  </script>
</body>
